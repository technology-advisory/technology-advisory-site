<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sección en Desarrollo | Technology Advisory</title>
    <meta name="description" content="Esta sección está siendo preparada. Estamos configurando la infraestructura.">
    <meta name="robots" content="noindex, follow">
    <meta name="author" content="Miguel Ángel Carriazo">
    <meta name="theme-color" content="#059669">

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dossier-core.css">
    <link rel="stylesheet" href="css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        .err-wrapper {
            padding: 80px 48px;
            text-align: center;
        }
        .err-code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #059669; /* Verde corporativo */
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .err-icon {
            font-size: clamp(64px, 15vw, 120px);
            line-height: 1;
            margin-bottom: 24px;
            display: inline-block;
        }
        .err-title {
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 800;
            color: #151915;
            margin: 0 0 12px;
        }
        .err-desc {
            font-size: 17px;
            color: #4a4a44;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto 40px;
        }
        .err-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .err-btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s;
        }
        .err-btn-primary {
            background: #059669;
            color: #fff;
        }
        .err-btn-primary:hover { background: #047857; }
        .err-btn-secondary {
            background: #fafaf8;
            color: #151915;
            border: 1px solid #ededea;
        }
        .err-btn-secondary:hover { background: #ededea; }

        @media (max-width: 768px) {
            .err-wrapper { padding: 40px 24px; }
            .err-actions { flex-direction: column; }
            .err-btn { width: 100%; text-align: center; box-sizing: border-box; }
        }
    </style>
</head>
<body>

<div class="card-wrapper ds-page">
<div class="card">

    <!-- Menú dinámico -->
    <div id="menu-container"></div>

    <!-- Bloque de Contenido Tipo Dossier -->
    <main class="err-wrapper">
        <div class="err-code">Status: Deploying Infrastructure</div>
        <div class="err-icon">⚙️</div>
        <h1 class="err-title">Módulo en Desarrollo</h1>
        <p class="err-desc">
            Esta sección está siendo preparada y optimizada bajo criterios de resiliencia y seguridad operativa. 
            Estamos desplegando los componentes necesarios en nuestros entornos híbridos. Vuelve pronto.
        </p>

        <div class="err-actions">
            <a href="index.html" class="err-btn err-btn-primary">← Volver al inicio</a>
            <a href="sobre-mi/sobre-mi.html" class="err-btn err-btn-secondary">Saber más sobre mí</a>
        </div>
    </main>

    <!-- Footer dinámico -->
    <div id="footer-container"></div>

</div>
</div>

<!-- Scripts -->
<script src="js/menu.js"></script>
<script src="js/footer.js"></script>
<script src="js/main.js"></script>

</body>
</html>
