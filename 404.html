<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · Recurso no encontrado | Technology Advisory</title>
    <meta name="description" content="El recurso tecnológico solicitado no está disponible o ha sido movido de servidor.">
    <meta name="robots" content="noindex, follow">
    <meta name="author" content="Miguel Ángel Carriazo">
    <meta name="theme-color" content="#059669">

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dossier-core.css">
    <link rel="stylesheet" href="css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        .err-wrapper {
            padding: 60px 48px;
            text-align: center;
        }
        .err-code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .err-number {
            font-size: clamp(96px, 20vw, 180px);
            font-weight: 900;
            color: #0f172a;
            line-height: 1;
            letter-spacing: -0.04em;
            margin: 0;
        }
        .err-number span { color: #059669; } /* Cero en Verde Esmeralda Corporativo */
        
        .err-title {
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 800;
            color: #0f172a;
            margin: 24px 0 12px;
        }
        .err-desc {
            font-size: 17px;
            color: #475569;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto 40px;
        }
        .err-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .err-btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s;
        }
        .err-btn-primary {
            background: #059669;
            color: #fff;
        }
        .err-btn-primary:hover { background: #047857; }
        .err-btn-secondary {
            background: #f8fafc;
            color: #0f172a;
            border: 1px solid #e2e8f0;
        }
        .err-btn-secondary:hover { background: #e2e8f0; }

        @media (max-width: 768px) {
            .err-wrapper { padding: 40px 24px; }
            .err-actions { flex-direction: column; }
            .err-btn { width: 100%; text-align: center; box-sizing: border-box; }
        }
    </style>
</head>
<body>

<div class="card-wrapper ds-page">
<div class="card">

    <!-- Menú dinámico -->
    <div id="menu-container"></div>

    <!-- Contenido Principal -->
    <main class="err-wrapper">
        <div class="err-code">Error 404 · Recurso no localizado</div>
        <h1 class="err-number">4<span>0</span>4</h1>
        <h2 class="err-title">Ruta fuera de archivo</h2>
        <p class="err-desc">
            La URL que has solicitado no está registrada en el servidor. Puede haber sido movida de directorio, renombrada o modificado su índice de acceso.
        </p>

        <div class="err-actions">
            <a href="index.html" class="err-btn err-btn-primary">← Volver al inicio</a>
            <a href="sobre-mi/sobre-mi.html" class="err-btn err-btn-secondary">Contacto Técnico</a>
        </div>
    </main>

    <!-- Footer dinámico -->
    <div id="footer-container"></div>

</div>
</div>

<!-- Scripts -->
<script src="js/menu.js"></script>
<script src="js/footer.js"></script>
<script src="js/main.js"></script>

</body>
</html>
