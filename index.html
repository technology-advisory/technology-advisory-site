<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Technology Advisory | Arquitectura & Ciberseguridad</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: "Segoe UI", Arial, sans-serif;
color:white;
text-align:center;
background:url('fondo.jpg') no-repeat center center fixed;
background-size:cover;
min-height:100vh;
overflow:auto;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.30);
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
max-width:900px;
padding:20px;
animation:fadeIn 1.8s ease;
}

.domain{
font-size:22px;
letter-spacing:6px;
margin-bottom:35px;
opacity:0.95;
font-weight:500;
}

h1{
font-size:56px;
font-weight:600;
margin-bottom:25px;
line-height:1.3;
text-shadow:0 0 25px rgba(255,120,0,0.45);
}

.subtitle{
font-size:24px;
opacity:0.9;
line-height:1.6;
}

.launch{
margin-top:45px;
font-size:20px;
letter-spacing:2px;
opacity:0.85;
}

footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-size:14px;
opacity:0.6;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translate(-50%,-40%);
}
to{
opacity:1;
transform:translate(-50%,-50%);
}
}

/* -------- RESPONSIVE -------- */

@media (max-width:900px){

.container{
width:90%;
}

h1{
font-size:42px;
}

.subtitle{
font-size:20px;
}

}

@media (max-width:600px){

.domain{
font-size:16px;
letter-spacing:4px;
}

h1{
font-size:32px;
}

.subtitle{
font-size:18px;
}

.launch{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="container">

<div class="domain">
TECHNOLOGY-ADVISORY
</div>

<h1>
Arquitectura de Infraestructura<br>
-- Ciberseguridad -- 
</h1>

<div class="subtitle">
Gobernanza · Riesgo · ENS · ISO 27001 · NIS2<br>
Entornos híbridos
</div>


</div>

<footer>
© 2026 Technology-Advisory.es
</footer>

</body>

</html>
