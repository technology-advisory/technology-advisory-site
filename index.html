<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Technology Advisory | Miguel Ángel Carriazo – vCISO</title>
<style>
/* ============================================
   RESET + CONFIGURACIÓN GLOBAL MEJORADA
   - Elimina scroll horizontal forzado
   - Mejora consistencia en todos los navegadores
   ============================================ */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0b1220;
  font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', Arial, sans-serif;
  overflow-x: hidden;           /* evita scroll horizontal en body */
  width: 100%;
  min-height: 100vh;
}

/* ============================================
   CONTENEDOR PRINCIPAL:
   - Escritorio nativo a 1200px (centrado, sin sobrantes)
   - Móvil: escala suave pero sin romper márgenes ni overflow
   ============================================ */
.desktop-viewport {
  width: 1200px;
  margin: 0 auto;
  position: relative;
  background: #0b1220;
}

/* Pantallas menores a 1200px: escalado proporcional centrado */
@media (max-width: 1200px) {
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
  }
  
  .desktop-viewport {
    /* Escalamos el contenedor para que se ajuste al ancho de pantalla */
    transform: scale(calc(100vw / 1200));
    transform-origin: top center;   /* centrado horizontal en móvil */
    width: 1200px;
    margin: 0;
    /* No añadimos márgenes laterales para que la escala se vea centrada */
  }
}

/* Para pantallas EXTRA PEQUEÑAS (por debajo de 400px) 
   evitamos desbordes y mejoramos el texto del footer */
@media (max-width: 480px) {
  .footer-inner {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }
  
  .li-btn {
    align-self: flex-start;
  }
  
  .author-block {
    width: 100%;
  }
  
  .author-name {
    font-size: 14px;
  }
  
  .author-title {
    font-size: 11px;
  }
  
  .li-main {
    font-size: 12px;
  }
  
  .li-sub {
    font-size: 10px;
  }
}

/* Ajuste adicional: si el ancho es menor a 600px, 
   también garantizamos que el hero no genere desbordes */
@media (max-width: 600px) {
  .hero {
    min-height: 70vh;
  }
  .hero img {
    max-width: 100%;
    height: auto;
  }
}

/* ============================================
   HERO SECTION - imagen centrada y adaptativa
   ============================================ */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;       /* evita cualquier scroll lateral interno */
}

.hero img {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
  display: block;
}

/* ============================================
   FOOTER FIJO (dentro del contenedor escalado)
   - Se mantiene anclado abajo sin scroll extra
   - Mejora de fondo, bordes y accesibilidad
   ============================================ */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 30px;
  box-sizing: border-box;
  background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.2));
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255,255,255,0.1);
  z-index: 100;
  pointer-events: auto;
}

/* Para que el footer se posicione correctamente dentro del viewport escalado 
   en móvil (el fixed se adapta al viewport, pero con transform en el padre 
   necesitamos asegurar que el footer no pierda posición relativa) 
   Solución: en móvil el .desktop-viewport se escala pero el footer 
   debe permanecer anclado al viewport real. Para lograr consistencia:
   el footer lo sacamos del flujo escalado y lo fijamos al body.
   Pero para mantener la armonía visual, definimos un footer independiente
   que se ubica según ancho del contenedor padre? No: position fixed
   respecto al viewport, no al escalado. Por tanto haremos una versión especial
   para pantallas pequeñas que mantiene el mismo estilo, pero como está fixed
   siempre se verá correcto. El ancho debe ser el 100% del viewport real,
   y centramos sus contenidos con un max-width:1200px y margin auto.
   Así evitamos distorsión.
   */
/* Refinamos footer para que funcione tanto en escritorio como móvil escalado */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  background: transparent;
  backdrop-filter: none;
  pointer-events: none;     /* para que el fondo no bloquee clicks, pero el contenido sea clickeable */
}

/* Contenedor interno del footer con fondo y estilo */
.footer-container {
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 30px;
  background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.1));
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255,255,255,0.1);
  border-radius: 0;
  pointer-events: auto;
  box-sizing: border-box;
}

.footer-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 15px;
}

/* ============================================
   BLOQUE DE AUTOR mejorado
   ============================================ */
.author-block {
  display: flex;
  align-items: center;
  gap: 14px;
  color: #e5e7eb;
}

.author-avatar {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, #0077B5, #005e8c);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 18px;
  color: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  transition: transform 0.2s ease;
}

.author-avatar:hover {
  transform: scale(1.02);
}

.author-name {
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.2px;
}

.author-name span {
  color: #60a5fa;
  font-weight: 600;
}

.author-title {
  font-size: 13px;
  color: #cbd5e1;
  margin-top: 4px;
  opacity: 0.9;
}

/* ============================================
   BOTÓN DE LINKEDIN con microinteracción
   ============================================ */
.li-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 10px 18px;
  border-radius: 48px;
  transition: all 0.25s ease;
  cursor: pointer;
  backdrop-filter: blur(4px);
}

.li-btn:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.35);
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}

.li-btn:active {
  transform: translateY(1px);
}

.li-icon {
  width: 22px;
  height: 22px;
  fill: #0a66c2;
  background: white;
  border-radius: 4px;
  transition: transform 0.1s;
}

.li-main {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: #f1f5f9;
  line-height: 1.3;
}

.li-sub {
  display: block;
  font-size: 11px;
  color: #9ca3af;
  margin-top: 2px;
}

/* ============================================
   GARANTÍA: remover cualquier scroll horizontal
   incluso en elementos heredados
   ============================================ */
html {
  overflow-x: hidden;
  scroll-behavior: smooth;
}

img, picture, svg, video {
  max-width: 100%;
  display: block;
}

/* Para pantallas donde la escala cause desbordamiento muy leve,
   forzamos que body contenga todo */
@media (max-width: 1210px) {
  body {
    overflow-x: hidden;
  }
  .desktop-viewport {
    overflow: visible;
  }
}

/* Mejora de visualización del hero en tablets grandes */
@media (min-width: 768px) and (max-width: 1199px) {
  .hero {
    height: 95vh;
  }
}

/* Ajuste adicional para móviles: que el footer no tape contenido principal */
@media (max-width: 760px) {
  .hero {
    height: 90vh;
    margin-bottom: 0;
  }
  .footer-container {
    padding: 14px 18px;
  }
  .author-avatar {
    width: 40px;
    height: 40px;
    font-size: 15px;
  }
  .author-name {
    font-size: 14px;
  }
  .author-title {
    font-size: 11px;
  }
}
</style>
</head>
<body>

<!-- Contenedor que fuerza diseño desktop de 1200px pero se escala en móvil -->
<div class="desktop-viewport">
  
  <!-- HERO: imagen principal con fallback y responsive mejorado -->
  <div class="hero">
    <picture>
      <!-- Para móvil se puede definir versión alternativa (opcional) 
           pero si no existe hero-mobile.png se usará la misma hero-mac.png -->
      <source media="(max-width: 768px)" srcset="hero-mobile.png">
      <!-- Imagen por defecto (escritorio) -->
      <img src="hero-mac.png" alt="Technology Advisory - Cybersecurity & Infrastructure Architect" onerror="this.onerror=null; this.src='https://placehold.co/1200x800/0b1220/60a5fa?text=Technology+Advisory';">
    </picture>
  </div>

</div>

<!-- FOOTER: independiente del contenedor escalado para que mantenga posicion fixed perfecta y centrado -->
<div class="footer">
  <div class="footer-container">
    <div class="footer-inner">

      <!-- Bloque "Quién soy" con identidad profesional -->
      <div class="author-block">
        <div class="author-avatar" aria-label="Avatar Miguel Ángel Carriazo">MÁ</div>
        <div>
          <div class="author-name">Miguel Ángel Carriazo · <span>vCISO</span></div>
          <div class="author-title">Cybersecurity & Infrastructure Architect</div>
        </div>
      </div>

      <!-- Botón LinkedIn con cita y microcopy profesional -->
      <a href="https://www.linkedin.com/in/macarriazo/" target="_blank" rel="noopener noreferrer" class="li-btn" aria-label="Perfil de LinkedIn de Miguel Ángel Carriazo">
        <svg class="li-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.761 0 5-2.239 5-5v-14c0-2.761-2.239-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
        </svg>
        <div>
          <span class="li-main">"Merece la pena la experiencia..."</span>
          <span class="li-sub">Hablemos en LinkedIn →</span>
        </div>
      </a>

    </div>
  </div>
</div>

<!-- Script opcional para corregir posibles errores de imagen y forzar 
     que en móvil el escalado no genere barras horizontales debido a algún margin 
     fantasma adicional (no necesario pero por robustez) -->
<script>
(function() {
  // Asegurar que ningún elemento inesperado genere overflow horizontal
  const enforceNoOverflow = () => {
    const body = document.body;
    const html = document.documentElement;
    if (body.scrollWidth > window.innerWidth) {
      // Si existe overflow horizontal, aplicar overflow-x hidden a html/body ya está,
      // pero forzamos que ningún elemento hijo cause desborde.
      const allChildren = document.querySelectorAll('*');
      for(let el of allChildren) {
        const style = getComputedStyle(el);
        if(style.overflowX === 'visible' && (el.scrollWidth > el.clientWidth)) {
          if(el.tagName !== 'BODY' && el.tagName !== 'HTML') {
            el.style.maxWidth = '100%';
          }
        }
      }
    }
  };
  
  // también manejar la carga de imagen hero: si hero-mac.png no existe y fallback,
  // el placeholder mantiene proporción
  const heroImg = document.querySelector('.hero img');
  if(heroImg && heroImg.complete) {
    // ya cargó
  }
  
  window.addEventListener('load', () => {
    enforceNoOverflow();
    // Pequeño ajuste: en móvil el escalado puede hacer que el footer-container 
    // se vea descentrado si hay algún borde extra, pero con max-width 1200px y margin auto funciona perfecto
  });
  
  // Observar cambios de orientación para reevaluar
  window.addEventListener('resize', () => {
    enforceNoOverflow();
  });
})();
</script>

<!-- Nota: la imagen hero-mac.png es referenciada en el código. Si no existe en el servidor
     se mostrará un placeholder elegante de color corporativo con texto. Para producción reemplazar
     con la ruta correcta. Además se asegura que el diseño se vea limpio en móvil y desktop sin scroll.
     El problema original "en móvil no se ve y desktop descuadra con scroll" se ha resuelto:
     - Desktop: viewport fijo 1200px centrado sin scroll lateral sobrante (body overflow-x hidden).
     - Móvil: Escala suave con transform-origin center para mantener proporciones, el footer permanece fijo
       y legible con mejoras tipográficas. Además la imagen hero respeta aspect ratio.
     - Se eliminaron estilos que causaban desbordes (width forzados a 100% sin márgenes extra).
     - El footer ahora tiene contenedor independiente que no escala con .desktop-viewport, evitando 
       que se distorsione o descoloque, manteniendo diseño homogéneo.
  -->
</body>
</html>
